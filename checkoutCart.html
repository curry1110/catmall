<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物車結帳資料確認</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkoutCart.css">
</head>
<body class="checkout-body">

    <div class="checkout-container">
        <h2>結帳資料確認</h2>

        <div id="error-box" class="error-msg" style="display: none;"></div>

        <div id="checkout-products-list">
            <p class="loading-text">正在載入您的購物車清單...</p>
        </div>

        <div class="total-amount-block">
            <span>應付總金額</span>
            <span id="total-amount-display">NT$ 0</span>
        </div>

        <form id="order-form" method="post">
            <label for="buyer_name">
                收件人姓名
                <input type="text" name="buyer_name" id="buyer_name" required placeholder="請輸入收件人完整姓名" />
            </label>
            
            <label for="buyer_phone">
                聯絡電話
                <input type="text" name="buyer_phone" id="buyer_phone" required placeholder="請輸入欲接收通知的電話" />
            </label>

            <button type="submit" class="btn-submit-order">確認送出訂單</button>
        </form>

        <div class="checkout-actions">
            <a href="cart.html" class="btn-secondary btn-orange">回購物車修改</a>
            <a href="index.html" class="btn-secondary btn-gray">返回商城首頁</a>
        </div>
    </div>

    <script src="js/checkoutCart.js"></script>

<footer>
    <p>© 2026 Paws for a Cause | All Rights Reserved</p>
</footer>

</body>
</html>
