<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .login-container {
            max-width: 420px;
            margin: 60px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px 36px;
        }
        .login-container h1 {
            text-align: center;
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 28px;
        }
        .login-form label {
            display: block;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
            margin-top: 16px;
        }
        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .login-form input:focus {
            border-color: #4CAF50;
        }
        .login-form input[type="submit"] {
            margin-top: 24px;
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .login-form input[type="submit"]:hover {
            background-color: #45a049;
        }
        .back-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #666;
        }
        .back-link a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="login-body">

    <div class="login-container">
        <h1>會員登入</h1>

        <form action="#" method="post" class="login-form">
            <label>帳號：</label>
            <input type="text" name="username" placeholder="請輸入帳號" required>
            <label>密碼：</label>
            <input type="password" name="password" placeholder="請輸入密碼" required>
            <input type="submit" value="登入">
        </form>

        <div class="back-link" style="margin-top: 20px;">
            還不是會員？<a href="register.html">點此註冊</a>
        </div>
        <div class="back-link" style="margin-top: 10px;">
            <a href="index.html">回首頁</a>
        </div>
    </div>

    <script src="js/auth.js"></script>

<footer>
    <p>© 2026 Paws for a Cause | All Rights Reserved</p>
</footer>

</body>
</html>
