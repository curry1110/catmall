<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品搜尋中 - 寵物商城</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/search.css">
</head>
<body class="search-body">

    <div class="search-container">
        <div id="search-status-loading" class="status-box">
            <div class="spinner"></div>
            <p>正在為您搜尋寵物寶貝的商品，請稍候...</p>
        </div>

        <div id="search-status-result" class="status-box" style="display: none;">
            <div class="error-icon">🔍</div>
            <h2 id="search-result-title">找不到相關產品</h2>
            <p id="search-result-desc">抱歉，我們目前沒有找到符合您輸入關鍵字的商品。要不要換個關鍵字再試試看呢？</p>
            
            <div class="search-actions">
                <a href="index.html" class="btn-search-back">返回商城首頁</a>
            </div>
        </div>
    </div>

    <script src="js/search.js"></script>

<footer>
    <p>© 2026 Paws for a Cause | All Rights Reserved</p>
</footer>

</body>
</html>
